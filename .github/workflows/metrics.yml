name: GitHub Metrics

on:
  schedule:
    - cron: "0 */6 * * *"   # refreshes every 6 hours
  workflow_dispatch:          # lets you run it manually too
  push:
    branches: [main]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AdA-5
          filename: github-metrics.svg

          # ── TEMPLATE & PALETTE ──────────────────────────────────────
          config_timezone: Africa/Nairobi
          config_padding: 10
          config_display: large

          # ── BASE ────────────────────────────────────────────────────
          base: header, activity, community, repositories, metadata

          # ── PLUGINS ─────────────────────────────────────────────────

          # languages — how your code is split
          plugin_languages: yes
          plugin_languages_limit: 10
          plugin_languages_threshold: 0%
          plugin_languages_colors: rose
          plugin_languages_sections: most-used, recently-used
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage, lines

          # activity — recent commits, PRs, issues
          plugin_activity: yes
          plugin_activity_limit: 6
          plugin_activity_days: 14
          plugin_activity_filter: all

          # habits — when you code, what IDE, etc
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes

          # achievements — unlock badges
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0

          # reactions — emoji reactions on your issues/PRs
          plugin_reactions: yes
          plugin_reactions_limit: 200
          plugin_reactions_details: percentage, count

          # introduction — your bio
          plugin_introduction: yes
          plugin_introduction_title: yes

          # repositories — pinned repos section
          plugin_repositories: yes
          plugin_repositories_featured: >-
            AdA-5/Strength-Analytics-System,
            AdA-5/Neon-Rush

          # calendar — year contribution heatmap
          plugin_calendar: yes
          plugin_calendar_limit: 1

          # topics — starred topics
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 20

          # wakatime (optional — only if you use it)
          # plugin_wakatime: yes
          # plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
