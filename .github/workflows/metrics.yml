name: My Profile Metrics

on:
  schedule:
    - cron: "0 */6 * * *"   # Refreshes every 6 hours
  workflow_dispatch:          # Lets you run it manually whenever you want!
  push:
    branches: [main]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AdA-5
          filename: github-metrics.svg

          # ── 🌸 THEME & COHESIVE AESTHETIC ───────────────────────────
          config_timezone: Africa/Nairobi
          config_padding: 10
          config_display: large
          config_theme: soft         # Soft, dreamy pastel background 🎀
          
          # ── ✨ GLITTER SHIMMER EFFECT (CUSTOM CSS INJECTION) ────────
          # This injects a subtle animated "shimmer/glisten" gradient 
          # across your card so it catches the light when viewed!
          config_twconfigured: |
            @keyframes glitter {
              0% { background-position: -200% 0; }
              100% { background-position: 200% 0; }
            }
            .header {
              background: linear-gradient(120deg, rgba(255,255,255,0) 30%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 70%);
              background-size: 200% 100%;
              animation: glitter 4s infinite linear;
            }
          
          # ── 📊 BASE SECTIONS ────────────────────────────────────────
          base: header, activity, community, repositories, metadata

          # ── 🎀 PLUGINS & ACCENTS ────────────────────────────────────

          # Languages — Customized with beautiful pinks and roses
          plugin_languages: yes
          plugin_languages_limit: 10
          plugin_languages_threshold: 0%
          plugin_languages_colors: rose  # Switches your code charts into shades of pink/rose! 💕
          plugin_languages_sections: most-used, recently-used
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage, lines

          # Activity — Recent commits and code updates
          plugin_activity: yes
          plugin_activity_limit: 6
          plugin_activity_days: 14
          plugin_activity_filter: all

          # Habits — Displays your daily coding patterns beautifully
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes

          # Achievements — Fixed the "C" circle! Now it displays as cute little compact badges/stickers 🌟
          plugin_achievements: yes
          plugin_achievements_threshold: C   
          plugin_achievements_display: compact # Hides the big "C" circle for a cleaner look!
          plugin_achievements_secrets: yes

          # Reactions — Your community heart & sparkle reactions
          plugin_reactions: yes
          plugin_reactions_limit: 200
          plugin_reactions_details: percentage, count

          # Repositories — Showcases your favorite pinned projects
          plugin_repositories: yes
          plugin_repositories_featured: >-
            AdA-5/Strength-Analytics-System,
            AdA-5/Neon-Rush

          # Calendar — Your contribution grid
          plugin_calendar: yes
          plugin_calendar_limit: 1

          # Topics — Displays your interests as clean icons
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 20
